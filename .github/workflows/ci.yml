name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test:
    name: build · vet · test (race)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true
      - name: Install ALSA (cgo audio)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Build
        run: go build ./...
      - name: Vet
        # -stdmethods=false: the MPRIS player exports a D-Bus method named Seek
        # (org.mpris.MediaPlayer2.Player.Seek) whose signature is fixed by the
        # spec and godbus reflection, so it can't match io.Seeker. All other vet
        # analyzers stay on.
        run: go vet -stdmethods=false ./...
      - name: Test (race + coverage)
        run: go test -race -coverprofile=coverage.out ./...
      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1
      - name: Build c-archive (corelib)
        run: CGO_ENABLED=1 go build -buildmode=c-archive -o /tmp/libdeezercore.a ./corelib

  lint:
    name: golangci-lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true
      - name: Install ALSA (cgo audio)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - uses: golangci/golangci-lint-action@v8
        with:
          version: latest

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true
      - name: Install ALSA (cgo audio)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...
