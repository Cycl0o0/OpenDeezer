name: android

on:
  push:
    branches: ["**"]
    paths:
      - "mobile/**"
      - "internal/**"
      - "gui/android/**"
      - ".github/workflows/android.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: build android (aar + apk)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK + NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;26.3.11579264" "platforms;android-34" "build-tools;34.0.0"

      - name: Build odmobile.aar (gomobile)
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/26.3.11579264
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          export PATH="$PATH:$(go env GOPATH)/bin"
          # Recent gomobile requires golang.org/x/mobile as a module dependency.
          go get golang.org/x/mobile/bind@latest
          gomobile init
          mkdir -p gui/android/app/libs
          gomobile bind -target=android -androidapi 24 \
            -o gui/android/app/libs/odmobile.aar ./mobile

      - name: Assemble debug APK
        working-directory: gui/android
        run: |
          chmod +x ./gradlew || true
          ./gradlew --no-daemon assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: opendeezer-android-debug
          path: gui/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
