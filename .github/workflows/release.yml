name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {} # allow manual runs (artifacts attach only on tag pushes)

permissions:
  contents: write

jobs:
  # Which GUI frontends are present in the tree — lets jobs skip cleanly until a
  # frontend (e.g. gui/windows) is committed.
  detect:
    runs-on: ubuntu-latest
    outputs:
      macos: ${{ steps.c.outputs.macos }}
      gnome: ${{ steps.c.outputs.gnome }}
      kde: ${{ steps.c.outputs.kde }}
      windows: ${{ steps.c.outputs.windows }}
    steps:
      - uses: actions/checkout@v4
      - id: c
        run: |
          for d in macos gnome kde windows; do
            if [ -d "gui/$d" ]; then echo "$d=true" >> "$GITHUB_OUTPUT"; else echo "$d=false" >> "$GITHUB_OUTPUT"; fi
          done

  # ---- Terminal client (TUI): pure-Go cross-compile (cgo only on linux/ALSA) ----
  tui:
    name: tui ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64, runner: ubuntu-24.04,     cgo: 1 }
          - { goos: linux,   goarch: arm64, runner: ubuntu-24.04-arm, cgo: 1 }
          - { goos: darwin,  goarch: arm64, runner: macos-latest,     cgo: 0 }
          - { goos: darwin,  goarch: amd64, runner: macos-latest,     cgo: 0 }
          - { goos: windows, goarch: amd64, runner: windows-latest,   cgo: 0 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Install ALSA (linux cgo)
        if: matrix.goos == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Build
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: |
          EXT=""; [ "$GOOS" = windows ] && EXT=".exe"
          OUT="opendeezer-${GOOS}-${GOARCH}${EXT}"
          go build -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" -o "$OUT" ./cmd/opendeezer
          echo "ARTIFACT=$OUT" >> "$GITHUB_ENV"
      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARTIFACT }}
          fail_on_unmatched_files: true

  # ---- macOS GUI (SwiftUI / Liquid Glass) ----
  # NOTE: Liquid Glass needs the macOS 26 / Xcode 26 SDK. Until GitHub offers a
  # macos-26 runner image this job may fail to compile; bump `runs-on` then.
  macos-app:
    needs: detect
    if: needs.detect.outputs.macos == 'true'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Build app bundle
        run: cd gui/macos && make app
      - name: Zip
        run: cd gui/macos && ditto -c -k --keepParent OpenDeezer.app ../../OpenDeezer-macos-arm64.zip
      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: OpenDeezer-macos-arm64.zip

  # ---- GNOME GUI (GTK4 / libadwaita) — needs ubuntu-24.04 (libadwaita >= 1.5) ----
  gnome:
    needs: detect
    if: needs.detect.outputs.gnome == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y libgtk-4-dev libadwaita-1-dev libjson-glib-dev libasound2-dev meson ninja-build
      - name: Build
        run: cd gui/gnome && chmod +x build.sh && ./build.sh
      - name: Stage artifact
        run: cp gui/gnome/opendeezer-gnome opendeezer-gnome-x86_64
      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: opendeezer-gnome-x86_64

  # ---- KDE GUI (Qt6 Widgets) ----
  kde:
    needs: detect
    if: needs.detect.outputs.kde == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y qt6-base-dev cmake libasound2-dev
      - name: Build
        run: cd gui/kde && chmod +x build.sh && ./build.sh
      - name: Stage artifact
        run: cp gui/kde/opendeezer-kde opendeezer-kde-x86_64
      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: opendeezer-kde-x86_64

  # ---- Windows GUI (WinUI 3 / C++/WinRT) — needs VS + WinApp SDK + MinGW (Go DLL) ----
  windows-gui:
    needs: detect
    if: needs.detect.outputs.windows == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - uses: microsoft/setup-msbuild@v2
      - name: Build (Go c-shared DLL + msbuild)
        shell: pwsh
        run: cd gui/windows; ./build.ps1
      - name: Zip
        shell: pwsh
        run: Compress-Archive -Path gui/windows/build/x64/Release/* -DestinationPath OpenDeezer-windows-x64.zip
      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: OpenDeezer-windows-x64.zip
