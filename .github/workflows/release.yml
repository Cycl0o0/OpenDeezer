name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {} # allow manual runs (artifacts attach only on tag pushes)

permissions:
  contents: write

jobs:
  # Which GUI frontends are present in the tree — lets jobs skip cleanly until a
  # frontend (e.g. gui/windows) is committed.
  detect:
    runs-on: ubuntu-latest
    outputs:
      macos: ${{ steps.c.outputs.macos }}
      gnome: ${{ steps.c.outputs.gnome }}
      kde: ${{ steps.c.outputs.kde }}
      windows: ${{ steps.c.outputs.windows }}
      linux: ${{ steps.c.outputs.linux }}
    steps:
      - uses: actions/checkout@v4
      - id: c
        run: |
          for d in macos gnome kde windows linux; do
            if [ -d "gui/$d" ]; then echo "$d=true" >> "$GITHUB_OUTPUT"; else echo "$d=false" >> "$GITHUB_OUTPUT"; fi
          done

  # ---- Terminal client (TUI) ----
  # The audio engine uses malgo (miniaudio), which needs cgo on every platform,
  # so all targets build with CGO_ENABLED=1 (was pure-Go under oto). darwin/amd64
  # is cross-built on the arm64 macOS runner via clang -arch x86_64; Windows uses
  # mingw gcc.
  tui:
    name: tui ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64, runner: ubuntu-24.04,     cgo: 1 }
          - { goos: linux,   goarch: arm64, runner: ubuntu-24.04-arm, cgo: 1 }
          - { goos: darwin,  goarch: arm64, runner: macos-latest,     cgo: 1 }
          - { goos: darwin,  goarch: amd64, runner: macos-latest,     cgo: 1 }
          - { goos: windows, goarch: amd64, runner: windows-latest,   cgo: 1 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Install ALSA (linux)
        if: matrix.goos == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Build
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: |
          EXT=""; [ "$GOOS" = windows ] && EXT=".exe"
          OUT="opendeezer-tui-${GOOS}-${GOARCH}${EXT}"
          LDFLAGS="-s -w -X main.version=${GITHUB_REF_NAME}"
          if [ "$GOOS" = darwin ] && [ "$GOARCH" = amd64 ]; then
            export CGO_CFLAGS="-arch x86_64" CGO_LDFLAGS="-arch x86_64"
          fi
          if [ "$GOOS" = windows ]; then
            # MinGW-w64 is preinstalled on windows-latest (same as the GUI job).
            export CC=x86_64-w64-mingw32-gcc
            LDFLAGS="$LDFLAGS -extldflags=-static"
          fi
          go build -ldflags "$LDFLAGS" -o "$OUT" ./cmd/opendeezer
          echo "ARTIFACT=$OUT" >> "$GITHUB_ENV"
      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARTIFACT }}
          fail_on_unmatched_files: true

  # ---- macOS GUI (SwiftUI / Liquid Glass) ----
  # Liquid Glass needs the macOS 26 / Xcode 26 SDK (.glassEffect etc. live in
  # SwiftUICore 26), so this requires the macos-26 runner image. That image is
  # rolling out (actions/runner-images#13739) and may be missing or buggy on a
  # given account/region, so keep the job non-blocking until it's GA — a failure
  # here must not fail the release (the TUI darwin matrix is cgo-free + unaffected).
  macos-app:
    needs: detect
    if: needs.detect.outputs.macos == 'true'
    runs-on: macos-26
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0"
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Build universal app bundle (arm64 + x86_64)
        run: cd gui/macos && make app
      - name: Zip
        run: cd gui/macos && ditto -c -k --keepParent OpenDeezer.app ../../OpenDeezer-macos-universal.zip
      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: OpenDeezer-macos-universal.zip

  # ---- GNOME GUI (GTK4 / libadwaita) — needs ubuntu-24.04 (libadwaita >= 1.5) ----
  gnome:
    needs: detect
    if: needs.detect.outputs.gnome == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-24.04,     arch: x86_64 }
          - { runner: ubuntu-24.04-arm, arch: aarch64 }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y libgtk-4-dev libadwaita-1-dev libjson-glib-dev libwebkitgtk-6.0-dev libsoup-3.0-dev libasound2-dev meson ninja-build
      - name: Build
        run: cd gui/gnome && chmod +x build.sh && ./build.sh
      - name: Stage artifact
        run: cp gui/gnome/opendeezer-gnome OpenDeezer-gnome-${{ matrix.arch }}
      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: OpenDeezer-gnome-${{ matrix.arch }}

  # ---- KDE GUI (Qt6 Widgets) ----
  kde:
    needs: detect
    if: needs.detect.outputs.kde == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-24.04,     arch: x86_64 }
          - { runner: ubuntu-24.04-arm, arch: aarch64 }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y qt6-base-dev qt6-webengine-dev cmake libasound2-dev
      - name: Build
        run: cd gui/kde && chmod +x build.sh && ./build.sh
      - name: Stage artifact
        run: cp gui/kde/opendeezer-kde OpenDeezer-kde-${{ matrix.arch }}
      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: OpenDeezer-kde-${{ matrix.arch }}

  # ---- Unified Linux client (GTK + Qt backends behind a dlopen launcher) ----
  linux-unified:
    needs: detect
    if: needs.detect.outputs.linux == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-24.04,     arch: x86_64 }
          - { runner: ubuntu-24.04-arm, arch: aarch64 }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y libgtk-4-dev libadwaita-1-dev libjson-glib-dev libwebkitgtk-6.0-dev libsoup-3.0-dev qt6-base-dev qt6-webengine-dev libasound2-dev meson ninja-build cmake
      - name: Build unified bundle
        run: cd gui/linux && chmod +x build.sh && ./build.sh
      - name: Package
        run: tar -C gui/linux/dist -czf OpenDeezer-linux-${{ matrix.arch }}.tar.gz .
      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: OpenDeezer-linux-${{ matrix.arch }}.tar.gz

  # ---- Windows GUI (C# WinUI 3 / .NET 8) — needs .NET SDK + MinGW (Go DLL) ----
  windows-gui:
    needs: detect
    if: needs.detect.outputs.windows == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Build (Go c-shared DLL + dotnet publish)
        shell: pwsh
        run: cd gui/windows; ./build.ps1
      - name: Zip
        shell: pwsh
        # build.ps1 publishes a self-contained win-x64 build (exe + WinAppSDK DLLs +
        # libdeezercore.dll) under bin\...\win-x64\publish. Resolve that dir robustly.
        run: |
          $exe = Get-ChildItem -Path gui/windows/bin -Filter OpenDeezer.exe -Recurse -File |
                 Where-Object { $_.FullName -match '\\publish\\' } | Select-Object -First 1
          if (-not $exe) { throw 'publish dir not found' }
          Compress-Archive -Path (Join-Path $exe.Directory.FullName '*') -DestinationPath OpenDeezer-windows-x64.zip
      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: OpenDeezer-windows-x64.zip

  # ---- Android app (Kotlin/Compose via gomobile AAR) ----
  android:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - name: Install NDK
        run: sdkmanager "ndk;26.3.11579264" "platforms;android-34" "build-tools;34.0.0"
      - name: Build odmobile.aar (gomobile)
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/26.3.11579264
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          export PATH="$PATH:$(go env GOPATH)/bin"
          go get golang.org/x/mobile/bind@latest
          gomobile init
          mkdir -p gui/android/app/libs
          gomobile bind -target=android -androidapi 24 -o gui/android/app/libs/odmobile.aar ./mobile
      - name: Assemble debug APK
        working-directory: gui/android
        run: |
          chmod +x ./gradlew || true
          ./gradlew --no-daemon assembleDebug
      - name: Stage artifact
        run: cp gui/android/app/build/outputs/apk/debug/*.apk OpenDeezer-android.apk
      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: OpenDeezer-android.apk

  # ---- Checksums: gather every released asset and publish SHA256SUMS.txt ----
  checksums:
    needs: [tui, macos-app, gnome, kde, linux-unified, windows-gui, android]
    if: startsWith(github.ref, 'refs/tags/') && always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist && cd dist
          gh release download "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" || true
      - name: Generate SHA256SUMS
        run: |
          cd dist && sha256sum * > ../SHA256SUMS.txt || true
          cat ../SHA256SUMS.txt || true
      - name: Upload checksums
        uses: softprops/action-gh-release@v2
        with:
          files: SHA256SUMS.txt
