name: ClusterFuzzLite (PR)
# Short fuzzing run focused on the code a pull request changes — catches crashes
# (panics / OOB / OOM) in the decrypt + decode paths before merge.
on:
  pull_request:
    branches: [main]
permissions: read-all
jobs:
  PR:
    runs-on: ubuntu-latest
    concurrency:
      group: cflite-pr-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Build Fuzzers
        id: build
        uses: google/clusterfuzzlite/actions/build_fuzzers@v1
        with:
          language: go
          github-token: ${{ secrets.GITHUB_TOKEN }}
          sanitizer: address
      - name: Run Fuzzers
        id: run
        uses: google/clusterfuzzlite/actions/run_fuzzers@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fuzz-seconds: 180
          mode: code-change
          sanitizer: address
