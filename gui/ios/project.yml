name: OpenDeezer
options:
  bundleIdPrefix: fr.cyclooo
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: false

settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_PREVIEWS: YES
    SWIFT_EMIT_LOC_STRINGS: YES
    # Automatic signing. Signing is disabled ONLY for the simulator (no cert
    # needed) via the SDK-conditional key below, so simulator/CI builds succeed
    # with no account configured. For a REAL-DEVICE run, set your own team in
    # Xcode (Signing & Capabilities) or pass it on the CLI:
    #   xcodebuild ... -allowProvisioningUpdates DEVELOPMENT_TEAM=<your-team-id>
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "Apple Development"
    "CODE_SIGNING_ALLOWED[sdk=iphonesimulator*]": "NO"

targets:
  OpenDeezer:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/OpenDeezer
    resources:
      - path: Resources/Assets.xcassets
    dependencies:
      - framework: Odmobile.xcframework
        embed: false
        link: true
    settings:
      base:
        PRODUCT_NAME: OpenDeezer
        PRODUCT_BUNDLE_IDENTIFIER: fr.cyclooo.OpenDeezer
        INFOPLIST_FILE: Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        "CODE_SIGNING_ALLOWED[sdk=iphonesimulator*]": "NO"
        SWIFT_VERSION: "5.0"
        MARKETING_VERSION: "1.5.0"
        CURRENT_PROJECT_VERSION: "1"
        SUPPORTS_MACCATALYST: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
